services:
  cockpit:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      AGENT_SERVICE_URL: http://agent:8000
      COCKPIT_SERVICE_TOKEN: ${COCKPIT_SERVICE_TOKEN:-dev-secret}
    depends_on:
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  agent:
    build:
      context: ./outreach-agent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      NODE_TOOL_BRIDGE_URL: http://cockpit:3000
      COCKPIT_SERVICE_TOKEN: ${COCKPIT_SERVICE_TOKEN:-dev-secret}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
